[pytest]
testpaths = tests
addopts = -q --strict-markers --cov=agentguard --cov=apps --cov-report=term-missing
markers =
    unit: fast, isolated tests of a single module (no runtime/graph)
    integration: tests that drive the full AgentGuard runtime end-to-end
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
branch = True
